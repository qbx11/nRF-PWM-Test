# Podstawy: PWM i Logi
CONFIG_PWM=y
CONFIG_LOG=y

# Kontrola Zegara (Wymagana przez sprzętowy kontroler USB w nRF!)
CONFIG_CLOCK_CONTROL=y

# Wymuszamy KLASYCZNY stos USB i twardo BLOKUJEMY nowy (żeby uniknąć konfliktów)
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_USB_DEVICE_PRODUCT="XIAO Wibracje"
CONFIG_USB_DEVICE_VID=0x2886
CONFIG_USB_DEVICE_PID=0x002B
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n

# Obsługa portu szeregowego
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y